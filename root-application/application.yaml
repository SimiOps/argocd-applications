apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sysdig-agent
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.sysdig.com
    chart: shield
    targetRevision: "1.33.0"
    helm:
      valueFiles:
        - https://raw.githubusercontent.com/SimiOps/argocd-applications/main/sysdig-agent/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: sysdig-agent
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
    - kind: Secret
      name: sysdig-agent-shield-cluster
      jsonPointers:
        - /data
    - kind: Secret
      name: sysdig-agent-shield-cluster-tls-certificates
      jsonPointers:
        - /data
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      jqPathExpressions:
        - .webhooks[].clientConfig.caBundle
    - group: apps
      kind: Deployment
      name: sysdig-agent-shield-cluster
      jsonPointers:
        - /spec/template/metadata/annotations/checksum~1webhook



---

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: result-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Santiagososs/example-voting-app
    targetRevision: main
    path: manifests/result
  destination:
    server: https://kubernetes.default.svc
    namespace: production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

